<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WanderlAI — Smart Travel Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">✈</span>
          <div>
            <div class="logo-name">WanderlAI</div>
            <div class="logo-sub">Travel Companion</div>
          </div>
        </div>
        <button class="sidebar-toggle-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
      </div>

      <div class="config-section">
        <h3 class="config-title">Travel Style</h3>
        <div class="style-options">
          <label class="style-card">
            <input type="radio" name="travelStyle" value="budget" />
            <span class="style-icon">🎒</span>
            <span class="style-label">Budget</span>
          </label>
          <label class="style-card">
            <input type="radio" name="travelStyle" value="comfort" checked />
            <span class="style-icon">🏨</span>
            <span class="style-label">Comfort</span>
          </label>
          <label class="style-card">
            <input type="radio" name="travelStyle" value="luxury" />
            <span class="style-icon">💎</span>
            <span class="style-label">Luxury</span>
          </label>
        </div>
      </div>

      <div class="config-section">
        <h3 class="config-title">Interests</h3>
        <div class="interest-tags">
          <label class="interest-tag">
            <input type="checkbox" value="adventure" /> 🧗 Adventure
          </label>
          <label class="interest-tag">
            <input type="checkbox" value="culture" checked /> 🏛️ Culture
          </label>
          <label class="interest-tag">
            <input type="checkbox" value="food" checked /> 🍜 Food
          </label>
          <label class="interest-tag">
            <input type="checkbox" value="nature" /> 🌿 Nature
          </label>
          <label class="interest-tag">
            <input type="checkbox" value="shopping" /> 🛍️ Shopping
          </label>
          <label class="interest-tag">
            <input type="checkbox" value="relaxation" /> 🏖️ Relaxation
          </label>
        </div>
      </div>

      <div class="config-section">
        <h3 class="config-title">AI Persona</h3>
        <div class="persona-options">
          <label class="persona-card active-persona" id="persona-explorer">
            <input type="radio" name="persona" value="explorer" checked />
            <span class="persona-icon">🗺️</span>
            <div>
              <div class="persona-name">Explorer</div>
              <div class="persona-desc">Hidden gems & adventures</div>
            </div>
          </label>
          <label class="persona-card" id="persona-planner">
            <input type="radio" name="persona" value="planner" />
            <span class="persona-icon">📋</span>
            <div>
              <div class="persona-name">Planner</div>
              <div class="persona-desc">Detailed itineraries</div>
            </div>
          </label>
          <label class="persona-card" id="persona-foodie">
            <input type="radio" name="persona" value="foodie" />
            <span class="persona-icon">🍽️</span>
            <div>
              <div class="persona-name">Foodie</div>
              <div class="persona-desc">Culinary experiences</div>
            </div>
          </label>
        </div>
      </div>

      <div class="config-section">
        <h3 class="config-title">Language</h3>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="id">🇮🇩 Indonesia</button>
          <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
      </div>

      <button class="apply-btn" id="applyConfig">Apply & Restart Chat</button>
    </aside>

    <!-- Main Chat Area -->
    <main class="main">
      <header class="chat-header">
        <button class="sidebar-toggle-open" id="sidebarOpen" aria-label="Open settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-info">
          <span class="header-title">WanderlAI</span>
          <span class="status-badge"><span class="status-dot"></span><span id="statusText">Online</span></span>
        </div>
        <button class="clear-btn" id="clearChat" title="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </header>

      <div id="chatBox" class="chat-box"></div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-btn" data-prompt-id="recommend">🗺️ Rekomendasi Destinasi</button>
        <button class="quick-btn" data-prompt-id="food">🍜 Kuliner Lokal</button>
        <button class="quick-btn" data-prompt-id="budget">💰 Panduan Budget</button>
        <button class="quick-btn" data-prompt-id="culture">🌏 Tips Budaya</button>
      </div>

      <div class="input-area">
        <form id="chatForm">
          <input type="text" id="userInput" placeholder="Tanyakan tentang destinasi perjalananmu..." autocomplete="off" required />
          <button type="submit" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
        <p class="disclaimer">WanderlAI powered by Claude AI · Selalu verifikasi informasi perjalanan terbaru sebelum bepergian.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
