<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <div>
          <div class="logo-name">Gemini AI</div>
          <div class="logo-sub">Powered by gemini-2.0-flash-lite</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>Online
      </div>
    </header>

    <div id="chat-box" class="chat-box">
      <div class="message bot">
        <div class="avatar">✦</div>
        <div class="bubble">Halo! Saya Gemini AI. Ada yang bisa saya bantu hari ini? 😊</div>
      </div>
    </div>

    <div class="input-area">
      <form id="chat-form">
        <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off" required />
        <button type="submit" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
      <p class="disclaimer">Gemini dapat membuat kesalahan. Periksa informasi penting.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
